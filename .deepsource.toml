version = 1

exclude_patterns = [
  # Third-party code and build output — not ours to fix, only adds noise.
  "vendor/**",
  "webroot/**",
  # Per-plugin webroot: served JS/CSS assets and install-specific theme code
  # (e.g. the Local/Bota themes, the SaitoSearch form init), not the core SPA
  # source under frontend/src. These are non-module scripts that use globals
  # ($, _, Backbone, Marionette, SaitoApp) loaded via <script> tags, so a
  # module analysis flags them (JS-0125 undeclared vars, JS-R1002, ...).
  # DeepSource's glob does not honour a mid-pattern wildcard, so the leading
  # `**/webroot/**` form is used, plus explicit per-plugin paths (no wildcard
  # before the trailing `**`, like the working `webroot/**`) as a guarantee.
  "**/webroot/**",
  "plugins/Bota/webroot/**",
  "plugins/Local/webroot/**",
  "plugins/SaitoSearch/webroot/**",
  "plugins/Stopwatch/webroot/**",
  # Developer scaffolding, not shipped app code: an outdated PHP7 docker dev
  # environment and helper scripts. Not worth holding to production lint rules.
  "dev/*",
  "dev/**",
  # App config/bootstrap: framework context that uses bootstrap constants
  # (ROOT, DS, APP) defined at runtime, so a standalone analysis reports them
  # as undefined (PHP-W1038). Not app logic. Both `config/*` (direct files
  # like app.php/bootstrap.php) and `config/**` (nested, e.g. Migrations) —
  # DeepSource's `**` matches nested paths but not direct files.
  "config/*",
  "config/**",
  # CakePHP view templates: their variables are injected by the controller
  # via $this->set()/compact(), so the analyzer can't see the definitions and
  # reports every one as "used but not defined" (PHP-W1066). Not real bugs.
  "templates/**",
  "**/templates/**",
  # Frontend: analyse our own TypeScript source under frontend/src, but skip
  # dependencies, build output and vendored/minified third-party libraries.
  "frontend/node_modules/**",
  "frontend/**/*.min.js",
  "frontend/src/lib/jquery-ui/**",
  "frontend/src/lib/jquery.i18n/**",
  # Karma/Jasmine test specs: .js ES modules using webpack-alias imports and
  # test globals (describe/it/expect) — low analysis value and noisy.
  "frontend/test/**",
  # Root build-tooling config (Node/CommonJS), not SPA app source — analysing
  # them as ES-module app code produces false positives (e.g. JS-0118 flags the
  # `'use strict'` that is actually correct in a CommonJS module). Explicit
  # filenames because the glob `**` does not match direct root files.
  "Gruntfile.js",
  "karma.conf.js",
  "webpack.config.js",
  # Legacy ES-module .js among the .ts source (entry wiring + old prototype/
  # jQuery-plugin helpers). DeepSource parses .js as a script and errors on
  # `import` (JS-0833); they carry near-zero analysis value and converting the
  # prototype/plugin code to strict .ts is not worth the risk. Explicit paths.
  "frontend/src/exports.js",
  "frontend/src/index.js",
  "frontend/src/lib/saito/backbone.initHelper.js",
  "frontend/src/lib/saito/jquery.scrollIntoView.js",
  "frontend/src/lib/saito/localStorageHelper.js",
  "frontend/src/lib/saito/templateHelpers.js",
]

test_patterns = [
  "tests/**",
  "plugins/*/tests/**",
]

[[analyzers]]
name = "php"
enabled = true

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  # Browser SPA (jQuery / Backbone / Marionette).
  environment = ["browser"]
